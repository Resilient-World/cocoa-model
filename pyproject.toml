disable_error_code = [
  "misc",
  "arg-type",
  "return-value",
  "attr-defined",
  "no-any-return",
  "import-untyped",
  "import-not-found",
  "no-untyped-def",
  "no-untyped-call",
  "type-arg",
  "assignment",
  "union-attr",
  "dict-item",
  "name-defined",
  "valid-type",
  "operator",
  "call-arg",
  "untyped-decorator",
  "call-overload",
  "override",
  "index",
  "unused-ignore",
  "comparison-overlap",
]

[[tool.mypy.overrides]]
module = ["scripts.*"]
disable_error_code = [
  "misc",
  "arg-type",
  "return-value",
  "attr-defined",
  "no-any-return",
  "dict-item",
  "import-not-found",
  "import-untyped",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "B", "I", "UP", "N", "ANN", "SIM", "RUF"]
ignore = [
  # Ruff ratchet phase 1 — tighten in follow-up PRs (see docs/TYPING_PLAYBOOK.md)
  "ANN001",
  "ANN201",
  "ANN202",
  "ANN204",
  "ANN205",
  "ANN206",
  "ANN401",
  "N803",
  "N806",
  "N812",
  "RUF001",
  "RUF002",
  "RUF003",
  "E501",
  "E402",
  "F841",
  "SIM108",
  "SIM102",
  "SIM103",
  "B905",
  "B023",
  "B007",
  "RUF059",
  "RUF005",
  "RUF007",
  "RUF012",
  "RUF015",
  "RUF034",
  "E731",
  "N814",
  "N818",
  "N805",
  "F822",
  "F821",
  "UP028",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S101"]
"scripts/**/*.py" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "integration: tests that call Google Earth Engine (require credentials)",
    "aurora: Aurora 1.5 forward / cache tests (install [aurora] extra)",
    "slow: downloads Galileo weights or runs encoder forward pass",
    "slow: AgriFM Video Swin forward (depth-18 stage)",
    "terramind: TerraMind / TerraTorch registry forward or HF download",
    "gpu: CorrDiff / Earth2Studio integration (requires GPU and [corrdiff] extra)",
    "slow: DR policy tree bootstrap or simulation loops",
]
