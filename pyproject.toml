[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "resilient-cocoa-model"
version = "0.1.0"
description = "Geospatial machine learning for resilient cocoa modeling"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Resilient World" }]
dependencies = [
    "geopandas>=0.14",
    "rasterio>=1.3",
    "xarray>=2024.1",
    "netcdf4>=1.6",
    "earthengine-api>=0.1.400",
    "torch>=2.1",
    "torchgeo>=0.5",
    "terratorch>=0.1",
    "mlflow>=2.10",
    "dvc>=3.0",
    "scikit-learn>=1.4",
    "pandas>=2.1",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "ipython>=8.0",
    "jupyter>=1.0",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
