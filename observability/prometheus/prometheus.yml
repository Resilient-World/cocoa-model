global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: cocoa-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
    # Set bearer_token in production when METRICS_AUTH_TOKEN is configured.

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
