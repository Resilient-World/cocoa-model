[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8001}"
healthcheckPath = "/health"
healthcheckTimeout = 30

[variables]
API_PORT = "8001"

# Required Railway variables:
# COCOA_MODEL_API_KEY: long random string generated with `openssl rand -hex 32`
# COCOA_MODEL_ALLOWED_ORIGINS: comma-separated main backend/proxy origins
