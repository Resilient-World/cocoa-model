name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-dvc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests scripts

      - name: Pytest
        env:
          PYTHONPATH: src
        run: |
          pytest \
            tests/test_joint_exposure_yield.py \
            tests/test_api_simulate.py \
            tests/test_feature_resolver.py \
            tests/test_yield_surrogate.py \
            tests/test_psm_matching.py \
            tests/test_did_impact.py \
            tests/test_conformal.py \
            -q --tb=short

      - name: DVC pipeline graph
        run: dvc dag

      - name: DVC stage list (validate pipeline definition)
        run: dvc stage list
