name: Typecheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy ratchet (strict-enabled modules)
        run: make typecheck-strict

      - name: Mypy full src (gradual overrides)
        run: make typecheck
