name: CD staging (promote on tag)

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: resilient-world/cocoa-model

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,mlops]"

      - name: Pull container image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} || \
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Register and run promotion gate
        env:
          PYTHONPATH: src
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
        run: |
          if [ -z "${MLFLOW_TRACKING_URI}" ]; then
            export MLFLOW_TRACKING_URI="file://${{ github.workspace }}/mlruns"
          fi
          python scripts/register_checkpoint.py --model-name yield_surrogate_v2 \
            --checkpoint models/yield_surrogate_v2.pt || true
          RUN_ID=$(python -c "import mlflow; c=mlflow.MlflowClient(); m=c.get_model_version_by_alias('yield_surrogate_v2','challenger'); print(m.run_id)")
          python -m registry.promotion_gate --model yield_surrogate_v2 --challenger-run-id "$RUN_ID" \
            --out release_evidence/gate_result.json || true
          if [ -f release_evidence/gate_result.json ]; then
            python -m registry.promote --model yield_surrogate_v2 --env staging || true
          fi
