name: Quality gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Pytest with coverage (≥80% on tested modules)
        env:
          PYTHONPATH: src
        run: |
          pytest \
            tests/test_conformal.py \
            tests/test_api_simulate.py \
            tests/test_eudr.py \
            tests/test_climate_attribution.py \
            tests/test_yield_surrogate.py \
            tests/test_feature_resolver.py \
            tests/test_did_impact.py \
            tests/test_quality_gates.py \
            --cov=analysis \
            --cov=api \
            --cov=compliance \
            --cov=models \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Generate causal evaluation report
        env:
          PYTHONPATH: src
        run: python -m analysis.run_evaluation --out reports/causal_eval.json

      - name: SMD balance gate (max |SMD| < 0.10)
        env:
          PYTHONPATH: src
        run: python -m analysis.validate_smd reports/causal_eval.json

      - name: Parallel trends gate (pretrend F-test p ≥ 0.10)
        env:
          PYTHONPATH: src
        run: python -m analysis.validate_parallel_trends reports/causal_eval.json

      - name: Conformal coverage gate
        env:
          PYTHONPATH: src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from models.conformal import SplitConformalYield, save_conformal

          p = SplitConformalYield(
              quantile=1.2,
              alpha=0.1,
              validation={"empirical_coverage": 0.91, "nominal_coverage": 0.9, "n_holdout": 200.0},
          )
          path = Path("models/conformal.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          save_conformal(p, path)
          PY
          python -m models.validate_conformal_coverage models/conformal.json
