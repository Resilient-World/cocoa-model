name: Quality gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Pytest with coverage (≥80% on tested modules)
        env:
          PYTHONPATH: src
        run: |
          pytest \
            tests/test_conformal.py \
            tests/test_api_simulate.py \
            tests/test_eudr.py \
            tests/test_climate_attribution.py \
            tests/test_yield_surrogate.py \
            tests/test_feature_resolver.py \
            tests/test_did_impact.py \
            tests/test_quality_gates.py \
            tests/test_validation.py \
            tests/validation/ \
            --cov=analysis \
            --cov=api \
            --cov=compliance \
            --cov=models \
            --cov=validation \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Generate causal evaluation report
        env:
          PYTHONPATH: src
        run: python -m analysis.run_evaluation --out reports/causal_eval.json

      - name: SMD balance gate (max |SMD| < 0.10)
        env:
          PYTHONPATH: src
        run: python -m analysis.validate_smd reports/causal_eval.json

      - name: Parallel trends gate (pretrend F-test p ≥ 0.10)
        env:
          PYTHONPATH: src
        run: python -m analysis.validate_parallel_trends reports/causal_eval.json

      - name: Conformal coverage gate
        env:
          PYTHONPATH: src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from models.conformal import SplitConformalYield, save_conformal

          p = SplitConformalYield(
              quantile=1.2,
              alpha=0.1,
              validation={"empirical_coverage": 0.91, "nominal_coverage": 0.9, "n_holdout": 200.0},
          )
          path = Path("models/conformal.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          save_conformal(p, path)
          PY
          python -m models.validate_conformal_coverage models/conformal.json

      - name: External validation suite
        env:
          PYTHONPATH: src
        run: python -m validation.run_validate --reports-dir reports/validation

      - name: Kalischek IoU gate (≥ 0.55)
        env:
          PYTHONPATH: src
        run: python -m validation.kalischek_benchmark --report reports/validation/kalischek_benchmark.md

      - name: ICCO MAPE gate (≤ 25%)
        env:
          PYTHONPATH: src
        run: python -m validation.icco_yield_backtest --report reports/validation/icco_yield_backtest.md

  validate_spatial_nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Spatial block CV (quick)
        env:
          PYTHONPATH: src
        run: python scripts/validate_spatial_holdout.py --region both --quick
      - uses: actions/upload-artifact@v4
        with:
          name: spatial-cv-report
          path: reports/validation/spatial_cv_*.md

  validate_temporal_nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Temporal forward-chain (quick)
        env:
          PYTHONPATH: src
        run: python scripts/validate_temporal_holdout.py --quick
      - uses: actions/upload-artifact@v4
        with:
          name: temporal-cv-report
          path: reports/validation/temporal_cv_*.md
