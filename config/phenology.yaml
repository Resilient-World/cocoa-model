# Regional cocoa phenology calendars (day-of-year, inclusive start / exclusive end).
# Wrap year-end ranges as two intervals: [[start, 366], [1, end]].
#
# Literature anchors (West Africa bimodal pattern):
# - Ghana: Adjalloo et al. (2012) — main season Oct–Mar, mid-crop Apr–Jul.
# - Côte d'Ivoire: Aïkpokpodion (2010) — analogous bimodal calendar.
#
# Stages: dry_season | main_crop_setting | main_crop_pod_dev | mid_crop

regions:
  ghana:
    dry_season: [[122, 244]]
    main_crop_setting: [[244, 306]]
    main_crop_pod_dev: [[306, 366], [1, 91]]
    mid_crop: [[91, 122]]
