# DVC pipeline — production MLOps (mock_gee smoke + full GEE path via params.yaml)
# https://dvc.org/doc/user-guide/project-structure/pipelines

vars:
  - params.yaml

stages:
  stage_ingest_gee:
    cmd: python scripts/ingest_gee.py --write-era5-stub
    deps:
      - scripts/ingest_gee.py
      - params.yaml
    outs:
      - data/raw/ingest_manifest.json
      - data/raw/cocoa_aoi.geojson

  stage_ingest_era5:
    cmd: >
      python -m data.era5_ingest
      --region ${region}
      --start ${era5.start}
      --end ${era5.end}
      --out ${era5.out}
      --stub
    deps:
      - src/data/era5_ingest.py
      - src/data/pipeline_stubs.py
      - params.yaml
      - data/raw/cocoa_aoi.geojson
    outs:
      - ${era5.out}

  stage_ingest_s2:
    cmd: >
      python -m data.sentinel_composite
      --region ${region}
      --start ${sentinel.start}
      --end ${sentinel.end}
      --stub
      --output ${sentinel.manifest}
    deps:
      - src/data/sentinel_composite.py
      - src/data/pipeline_stubs.py
      - params.yaml
    outs:
      - ${sentinel.manifest}

  stage_ingest_fdp:
    cmd: >
      python -m data.cocoa_exposure
      --region ${region}
      --write-manifest ${fdp.manifest}
      --stub
    deps:
      - src/data/cocoa_exposure.py
      - src/data/pipeline_stubs.py
      - params.yaml
    outs:
      - ${fdp.manifest}

  stage_download_agrifm:
    cmd: python scripts/download_agrifm_weights.py
    deps:
      - scripts/download_agrifm_weights.py
    outs:
      - models/agrifm/agrifm_s2_pretrained.pt
      - models/agrifm/agrifm_s2_pretrained.pt.sha256

  stage_train_aef_head:
    cmd: >
      python scripts/train_aef_head.py
      --synthetic
      --epochs ${train.epochs}
      --checkpoint models/aef_cocoa_head.pt
    deps:
      - scripts/train_aef_head.py
      - src/models/aef_cocoa_head.py
      - params.yaml
    outs:
      - models/aef_cocoa_head.pt

  stage_train_galileo_seg:
    cmd: >
      python -m training.train_galileo_cocoa
      --synthetic
      --quick
      --out models/galileo_cocoa_seg.pt
      --metrics-out reports/train/galileo_seg_metrics.json
    deps:
      - src/training/train_galileo_cocoa.py
      - src/models/galileo_seg.py
      - params.yaml
    outs:
      - models/galileo_cocoa_seg.pt
    metrics:
      - reports/train/galileo_seg_metrics.json

  stage_train_agrifm:
    cmd: >
      python scripts/train_agrifm_cocoa.py
      --synthetic
      --max-tiles 100
      --quick
      --out models/agrifm_cocoa_seg.pt
    deps:
      - scripts/train_agrifm_cocoa.py
      - src/training/train_agrifm_cocoa.py
      - models/agrifm/agrifm_s2_pretrained.pt
      - params.yaml
    outs:
      - models/agrifm_cocoa_seg.pt

  stage_train_terramind:
    cmd: >
      python scripts/train_terramind_cocoa.py
      --synthetic
      --max-tiles 100
      --quick
      --out models/terramind_cocoa_seg.pt
    deps:
      - scripts/train_terramind_cocoa.py
      - src/training/train_terramind_cocoa.py
      - params.yaml
    outs:
      - models/terramind_cocoa_seg.pt

  stage_fit_ensemble_v3:
    cmd: >
      python scripts/fit_ensemble_v3_weights.py
      --synthetic
      --out config/ensemble_weights_v3.yaml
    deps:
      - scripts/fit_ensemble_v3_weights.py
      - models/aef_cocoa_head.pt
      - models/galileo_cocoa_seg.pt
      - models/agrifm_cocoa_seg.pt
      - models/terramind_cocoa_seg.pt
      - params.yaml
    outs:
      - config/ensemble_weights_v3.yaml

  stage_train_yield_v2:
    cmd: >
      python scripts/train_yield_surrogate_v2.py
      --synthetic
      --epochs ${train.epochs}
      --era5-dir data/era5
      --metrics-out reports/train/yield_v2_metrics.json
    deps:
      - scripts/train_yield_surrogate_v2.py
      - ${era5.out}
      - params.yaml
    outs:
      - models/yield_surrogate_v2.pt
      - data/simulations/case2_lhs.parquet
      - data/simulations/almanac_lhs.parquet
    metrics:
      - reports/train/yield_v2_metrics.json

  stage_train_casej:
    cmd: >
      python scripts/train_casej_surrogate.py
      --generate
      --n-generate 200
      --epochs ${train.epochs}
      --checkpoint models/casej_surrogate.pt
    deps:
      - scripts/train_casej_surrogate.py
      - scripts/generate_casej_training_set.py
      - params.yaml
    outs:
      - models/casej_surrogate.pt
      - data/simulations/casej_lhs.parquet

  stage_calibrate_cqr:
    cmd: >
      python scripts/train_cqr.py
      --synthetic
      --max-epochs ${train.epochs}
    deps:
      - scripts/train_cqr.py
      - ${era5.out}
      - params.yaml
    outs:
      - models/cqr_yield.pt
      - models/cqr_calibrator.joblib

  stage_train_cssvd_landscape:
    cmd: >
      python scripts/train_cssvd_landscape.py
      --synthetic
      --n-synthetic 500
      --checkpoint models/cssvd_landscape.joblib
    deps:
      - scripts/train_cssvd_landscape.py
      - data/external/dumont_cssvd_plots_synthetic.csv
      - data/external/muller2018_wa_strain_atlas.geojson
    outs:
      - models/cssvd_landscape.joblib
      - reports/cssvd_landscape_metrics.json

  stage_validate:
    cmd: >
      python -m validation.run_validate --mock --no-fail-fast &&
      python -m models.conformal.validate_conformal_coverage
      --calibration-report --synthetic --cv-strategy spatial_block
      --out reports/validation &&
      python scripts/plot_reliability.py --model cqr_yield --out-dir reports/validation
    deps:
      - src/validation/run_validate.py
      - src/validation/forecast_scoring.py
      - src/validation/baselines.py
      - src/validation/calibration_metrics.py
      - scripts/plot_reliability.py
      - models/galileo_cocoa_seg.pt
      - models/yield_surrogate_v2.pt
      - params.yaml
    outs:
      - reports/validation/summary.md
      - reports/validation/calibration_latest.json

  stage_eval_e2e:
    cmd: >
      python scripts/demo_end_to_end.py
      --mock-gee
      --out reports/demo/e2e_civ_v5.json
    deps:
      - scripts/demo_end_to_end.py
      - models/yield_surrogate_v2.pt
      - config/ensemble_weights_v3.yaml
      - params.yaml
    outs:
      - reports/demo/e2e_civ_v5.json

  # Optional extras (not in default repro graph tail)
  stage_ingest_teleconnection:
    cmd: python -m data.teleconnection_ingest --refresh
    deps:
      - src/data/teleconnection_ingest.py
    outs:
      - data/external/teleconnection_indices.parquet

  stage_benchmark:
    cmd: >
      python scripts/benchmark_backbones.py
      --quick
      --n-tiles 50
      --aef-checkpoint models/aef_cocoa_head.pt
      --latest-out reports/backbones/benchmark_latest.md
    deps:
      - scripts/benchmark_backbones.py
      - models/aef_cocoa_head.pt
    outs:
      - reports/backbones/benchmark_latest.md

  causal_evaluation:
    cmd: >
      python -m analysis.run_evaluation
      --out reports/causal_eval.json
      --synthetic-n 200
    deps:
      - src/analysis/run_evaluation.py
    metrics:
      - reports/causal_eval.json
