# DVC pipeline — https://dvc.org/doc/user-guide/project-structure/pipelines
# Core MLOps stages: GEE ingest markers → model training → backbone benchmark.

stages:
  stage_ingest_teleconnection:
    cmd: python -m data.teleconnection_ingest --refresh
    deps:
      - src/data/teleconnection_ingest.py
    outs:
      - data/external/teleconnection_indices.parquet

  stage_train_cssvd_landscape:
    cmd: >
      python scripts/train_cssvd_landscape.py
      --synthetic
      --n-synthetic 500
      --checkpoint models/cssvd_landscape.joblib
    deps:
      - scripts/train_cssvd_landscape.py
      - src/hazards/cssvd_landscape.py
      - src/data/dumont_supplement.py
      - src/data/cssvd_landscape_features.py
      - src/data/cssvd_strain_atlas.py
      - data/external/dumont_cssvd_plots_synthetic.csv
      - data/external/muller2018_wa_strain_atlas.geojson
    outs:
      - models/cssvd_landscape.joblib
      - reports/cssvd_landscape_metrics.json

  stage_ingest_gee:
    cmd: python scripts/ingest_gee.py
    deps:
      - scripts/ingest_gee.py
    outs:
      - data/raw/ingest_manifest.json
      - data/raw/cocoa_aoi.geojson

  stage_train_aef_head:
    cmd: >
      python scripts/train_aef_head.py
      --synthetic
      --epochs 5
      --checkpoint models/aef_head.pt
    deps:
      - scripts/train_aef_head.py
      - src/models/aef_cocoa_head.py
      - src/data/alphaearth_embeddings.py
    outs:
      - models/aef_head.pt

  stage_train_casej_surrogate:
    cmd: >
      python scripts/train_casej_surrogate.py
      --generate
      --n-generate 200
      --epochs 5
      --checkpoint models/casej_surrogate.pt
    deps:
      - scripts/train_casej_surrogate.py
      - scripts/generate_casej_training_set.py
      - src/models/casej_surrogate.py
      - src/models/casej_process.py
      - config/casej/params.yaml
    outs:
      - models/casej_surrogate.pt
      - data/simulations/casej_lhs.parquet

  stage_train_joint:
    cmd: >
      python scripts/train_joint.py
      --synthetic
      --max-epochs 5
      --checkpoint models/joint.pt
    deps:
      - scripts/train_joint.py
      - src/models/joint_exposure_yield.py
      - src/models/cqr.py
    outs:
      - models/joint.pt

  stage_train_agrifm_cocoa:
    cmd: >
      python scripts/train_agrifm_cocoa.py
      --synthetic
      --max-tiles 100
      --quick
      --out models/agrifm_cocoa_seg.pt
    deps:
      - scripts/train_agrifm_cocoa.py
      - src/training/train_agrifm_cocoa.py
      - src/training/cocoa_agrifm_datamodule.py
      - src/models/agrifm_seg.py
    outs:
      - models/agrifm_cocoa_seg.pt

  stage_train_terramind_cocoa:
    cmd: >
      python scripts/train_terramind_cocoa.py
      --synthetic
      --max-tiles 100
      --quick
      --out models/terramind_cocoa_seg.pt
    deps:
      - scripts/train_terramind_cocoa.py
      - src/training/train_terramind_cocoa.py
      - src/training/cocoa_terramind_datamodule.py
      - src/models/terramind_seg.py
      - src/models/terramind_backbone.py
      - src/models/terramind_cocoa_head.py
    outs:
      - models/terramind_cocoa_seg.pt

  stage_download_agrifm:
    cmd: python scripts/download_agrifm_weights.py
    deps:
      - scripts/download_agrifm_weights.py
    outs:
      - models/agrifm/agrifm_s2_pretrained.pt
      - models/agrifm/agrifm_s2_pretrained.pt.sha256

  stage_benchmark:
    cmd: >
      python scripts/benchmark_backbones.py
      --quick
      --n-tiles 50
      --aef-checkpoint models/aef_head.pt
      --latest-out reports/backbones/benchmark_latest.md
    deps:
      - scripts/benchmark_backbones.py
      - src/validation/kalischek_benchmark.py
      - models/aef_head.pt
    outs:
      - reports/backbones/benchmark_latest.md

  # Extended pipeline (optional repro)
  era5_ingest:
    cmd: >
      python -m data.era5_ingest
      --aoi data/raw/cocoa_aoi.geojson
      --start 2015-01-01
      --end 2024-12-31
      --out data/processed/era5_2020_2024.zarr
    deps:
      - data/raw/cocoa_aoi.geojson
      - src/data/era5_ingest.py
    outs:
      - data/processed/era5_2020_2024.zarr

  train_yield:
    cmd: >
      python -m training.train_yield --config-name yield
    deps:
      - config/training/yield.yaml
      - src/training/train_yield.py
      - src/models/yield_surrogate.py
    outs:
      - models/yield_surrogate_v1.pt

  causal_evaluation:
    cmd: >
      python -m analysis.run_evaluation
      --panel data/raw/farm_panel.parquet
      --out reports/causal_eval.json
    deps:
      - src/analysis/run_evaluation.py
      - src/analysis/did_impact.py
      - src/analysis/psm_matching.py
    metrics:
      - reports/causal_eval.json
