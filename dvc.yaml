# DVC pipeline — https://dvc.org/doc/user-guide/project-structure/pipelines

stages:
  era5_ingest:
    cmd: >
      python -m data.era5_ingest
      --aoi data/raw/cocoa_aoi.geojson
      --start 2015-01-01
      --end 2024-12-31
      --out data/processed/era5.zarr
    deps:
      - src/data/era5_ingest.py
      - data/raw/cocoa_aoi.geojson
    outs:
      - data/processed/era5.zarr

  attrici_counterfactual:
    cmd: >
      python -m counterfactual.attrici_runner
      --input data/processed/era5.zarr
      --gmt data/external/gmt_ssa.nc
      --out data/processed/era5_cf.zarr
      --overwrite
    deps:
      - data/processed/era5.zarr
      - src/counterfactual/attrici_runner.py
      - data/external/gmt_ssa.nc
    outs:
      - data/processed/era5_cf.zarr

  sentinel_composite:
    cmd: >
      python -m data.sentinel_composite
      --export local
      --out data/processed/s2_s1.tif
    deps:
      - src/data/sentinel_composite.py
    outs:
      - data/processed/s2_s1.tif

  train_prithvi:
    cmd: >
      python -m training.train_prithvi_cocoa
      --image-dir data/processed/s2_s1
      --mask-dir data/processed/masks
      --out models/segmentation.ckpt
      --epochs 1
      --train-length 10
    deps:
      - data/processed/s2_s1.tif
      - src/training/train_prithvi_cocoa.py
      - src/training/cocoa_prithvi_datamodule.py
    outs:
      - models/segmentation.ckpt

  train_yield:
    cmd: >
      python -m training.train_yield
      --climate data/processed/era5.zarr
      --panel data/raw/yield_panel.parquet
      --out models/yield.pt
    deps:
      - data/processed/era5.zarr
      - src/training/train_yield.py
      - src/models/yield_surrogate.py
    outs:
      - models/yield.pt

  calibrate_conformal:
    cmd: >
      python -m models.conformal calibrate
      --checkpoint models/yield.pt
      --calib data/processed/calib.parquet
      --out models/conformal.json
    deps:
      - models/yield.pt
      - src/models/conformal.py
    outs:
      - models/conformal.json

  causal_evaluation:
    cmd: >
      python -m analysis.run_evaluation
      --panel data/raw/farm_panel.parquet
      --out reports/causal_eval.json
    deps:
      - src/analysis/run_evaluation.py
      - src/analysis/did_impact.py
      - src/analysis/psm_matching.py
    metrics:
      - reports/causal_eval.json
